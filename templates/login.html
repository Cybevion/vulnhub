{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;">
  <h1 class="page-title" style="text-align:center;margin-bottom:0.5rem;">VulnLab Login</h1>
  <p style="text-align:center;color:var(--gray);font-size:12px;margin-bottom:2rem;">Use any test account from the dashboard</p>
  <div class="card">
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input name="username" class="form-input" placeholder="alice">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-input" placeholder="password1">
      </div>
      <button type="submit" class="btn btn-green" style="width:100%;">Login →</button>
    </form>
    {% if error %}<div class="alert alert-danger" style="margin-top:0.75rem;">{{ error }}</div>{% endif %}
    <div style="margin-top:1rem;font-size:11px;color:var(--gray);">
      Test accounts: alice/password1 · bob/bob123 · admin/admin123
    </div>
  </div>
</div>
{% endblock %}
